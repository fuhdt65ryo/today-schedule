<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: transparent;
      padding: 8px;
      color: #37352f;
      display: flex;
      flex-direction: column;
      /* 高さが足りない場合は切り捨てずスクロールさせる */
      overflow-y: auto;
      overflow-x: hidden;
    }

    .card {
      background: #fdfdfc;
      border: 1px solid #e9e7e4;
      border-radius: 12px;
      overflow: hidden;
    }

    /* 縦方向の余白配分：予定を最も広く、予報セルも伸ばす */
    .hero { flex-shrink: 0; }
    .section-label { flex-shrink: 0; }
    .sched-card {
      flex: 3 1 auto;
      /* 高さ不足でも予定が消えないよう最低3行分は確保し、中でスクロール */
      min-height: 88px;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    #hourly-container, #weekly-container {
      flex: 1 0 auto;
      display: flex;
      flex-direction: column;
    }
    .hourly, .weekly { flex: 1; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: #91918e;
      letter-spacing: 0.06em;
      margin: 10px 2px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-label:first-child { margin-top: 0; }
    .updating { font-size: 9px; font-weight: 500; color: #b3b3b0; }

    /* ── 現在天気（ヒーローカード） ── */
    .hero {
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.05);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .hero-main { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .hero-icon { font-size: 34px; line-height: 1; }
    .hero-temp { font-size: 28px; font-weight: 700; color: #1e293b; line-height: 1.1; }
    .hero-desc { font-size: 11px; color: #64748b; font-weight: 600; }
    .hero-meta {
      display: flex; flex-direction: column; gap: 4px;
      align-items: flex-end; flex-shrink: 0;
    }
    .hero-chip {
      font-size: 9px; color: #475569; font-weight: 600;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 999px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    /* 天気別グラデーション（ヒーロー用） */
    .hero.wx-sunny  { background: linear-gradient(135deg, #fff7e6, #ffe9c4); }
    .hero.wx-cloudy { background: linear-gradient(135deg, #f1f3f5, #e2e6ea); }
    .hero.wx-rainy  { background: linear-gradient(135deg, #e3edfb, #cfe0f6); }
    .hero.wx-storm  { background: linear-gradient(135deg, #e4e6f7, #cdd2ef); }
    .hero.wx-snow   { background: linear-gradient(135deg, #e8f6fd, #d3edfa); }

    /* ── 今日の予定 ── */
    .sched-card { padding: 4px 6px; }
    .event-list { display: flex; flex-direction: column; }
    .event-wrap { border-bottom: 1px solid #f0efec; }
    .event-wrap:last-child { border-bottom: none; }

    .event-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 6px; border-radius: 8px;
      min-height: 26px;
      cursor: pointer; transition: background 0.1s;
    }
    .event-item:hover, .event-item.open { background: #f1f0ee; }
    .event-item.done { opacity: 0.45; }

    .event-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-学校  { background: #f59e0b; }
    .dot-部活  { background: #3b82f6; }
    .dot-個人  { background: #ec4899; }
    .dot-出張  { background: #10b981; }
    .dot-受験  { background: #8b5cf6; }
    .dot-other { background: #9ca3af; }

    .event-time { font-size: 9px; color: #91918e; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .event-title {
      flex: 1; font-size: 11.5px; font-weight: 600; color: #37352f;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tag {
      font-size: 9px; font-weight: 600; padding: 1px 6px;
      border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }
    .tag-学校  { background: #fef3c7; color: #b45309; }
    .tag-部活  { background: #dbeafe; color: #1d4ed8; }
    .tag-個人  { background: #fce7f3; color: #be185d; }
    .tag-出張  { background: #d1fae5; color: #065f46; }
    .tag-受験  { background: #ede9fe; color: #5b21b6; }
    .tag-other { background: #f3f4f6; color: #6b7280; }

    .allday-badge { font-size: 9px; color: #91918e; }

    .detail {
      display: none;
      padding: 2px 8px 8px 19px;
      font-size: 10px; color: #64615c; line-height: 1.5;
    }
    .detail.visible { display: block; }
    .detail-row { display: flex; gap: 4px; margin-top: 2px; }
    .detail-label { flex-shrink: 0; }
    .detail-value { color: #37352f; white-space: pre-wrap; word-break: break-word; }

    .no-events  { color: #b3b3b0; font-size: 11px; padding: 8px 6px; }
    .error-text { color: #ef4444; font-size: 10px; padding: 6px; }
    .skeleton   { color: #c9c8c5; font-size: 11px; }

    /* ── 時間別予報（横スクロール・下段に降水量） ── */
    .h-scroll {
      flex: 1;
      display: flex; flex-direction: column;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .h-scroll::-webkit-scrollbar { display: none; }
    .hourly {
      display: flex; gap: 4px;
      padding: 6px;
    }
    .h-item {
      flex: 1 0 38px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: space-evenly; gap: 2px;
      padding: 6px 0;
      border-radius: 9px;
    }
    .h-item.now { box-shadow: inset 0 0 0 1.5px #3b82f6; }
    .h-time { font-size: 9px; font-weight: 600; color: #78766f; }
    .h-item.now .h-time { color: #1d4ed8; }
    .h-icon { font-size: 15px; line-height: 1.2; }
    .h-temp { font-size: 10.5px; font-weight: 700; color: #37352f; font-variant-numeric: tabular-nums; }

    /* ── 降水量チャート（時間別予報の列に揃えた棒グラフ） ── */
    .rain-chart {
      flex-shrink: 0;
      display: flex; gap: 4px;
      height: 42px;
      padding: 4px 6px 6px;
      border-top: 1px solid #f0efec;
    }
    .rc-col {
      flex: 1 0 38px; min-width: 0;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .rc-bar {
      width: 60%; max-width: 16px;
      border-radius: 3px 3px 0 0;
      background: #60a5fa;
      min-height: 2px;
    }
    .rc-bar.hi { background: #2563eb; }
    .rc-max { font-weight: 500; color: #91918e; }

    /* ── 週間予報 ── */
    .weekly {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      padding: 6px;
    }
    .d-item {
      display: flex; flex-direction: column; align-items: center;
      justify-content: space-evenly; gap: 2px;
      padding: 6px 1px;
      border-radius: 9px;
      min-width: 0;
    }
    .d-item.today { box-shadow: inset 0 0 0 1.5px #3b82f6; }
    .d-day  { font-size: 10px; font-weight: 700; color: #4b4a47; }
    .d-day.sat { color: #2563eb; }
    .d-day.sun { color: #dc2626; }
    .d-icon { font-size: 15px; line-height: 1.2; }
    .d-rain { font-size: 8px; font-weight: 600; }
    .d-temps {
      display: flex; flex-direction: column; align-items: center;
      line-height: 1.25; font-variant-numeric: tabular-nums;
    }
    .d-hi { font-size: 10px; font-weight: 700; color: #dc2626; }
    .d-lo { font-size: 9px; color: #2563eb; }

    /* 天気別カラー（予報セル用） */
    .wx-sunny  { background: #fdf3e3; }
    .wx-cloudy { background: #ededeb; }
    .wx-rainy  { background: #e3edfb; }
    .wx-storm  { background: #e4e6f7; }
    .wx-snow   { background: #e8f6fd; }
    .rain-blue { color: #3b82f6; }
    .rain-gray { color: #b3b3b0; }

    /* ── ダークモード（OS/Notionのダークテーマに追従） ── */
    @media (prefers-color-scheme: dark) {
      body { color: #dedddb; }
      .card { background: #1f1f1f; border-color: #343434; }
      .section-label { color: #86847f; }
      .updating { color: #6f6e6b; }
      .hero { border-color: rgba(255,255,255,0.06); }
      .hero.wx-sunny  { background: linear-gradient(135deg, #38301c, #2c2616); }
      .hero.wx-cloudy { background: linear-gradient(135deg, #2a2c2f, #232527); }
      .hero.wx-rainy  { background: linear-gradient(135deg, #1d2a3d, #182333); }
      .hero.wx-storm  { background: linear-gradient(135deg, #262a45, #1f2238); }
      .hero.wx-snow   { background: linear-gradient(135deg, #1c2e3d, #172735); }
      .hero-temp { color: #f1f5f9; }
      .hero-desc { color: #94a3b8; }
      .hero-chip { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.08); color: #cbd5e1; }
      .event-wrap { border-color: #2d2d2d; }
      .event-item:hover, .event-item.open { background: #2a2a2a; }
      .event-time, .allday-badge { color: #86847f; }
      .event-title { color: #dedddb; }
      .detail { color: #a5a29c; }
      .detail-value { color: #dedddb; }
      .no-events { color: #6f6e6b; }
      .skeleton { color: #55534f; }
      .tag-学校 { background: rgba(245,158,11,.16); color: #fbbf24; }
      .tag-部活 { background: rgba(59,130,246,.16); color: #93c5fd; }
      .tag-個人 { background: rgba(236,72,153,.16); color: #f9a8d4; }
      .tag-出張 { background: rgba(16,185,129,.16); color: #6ee7b7; }
      .tag-受験 { background: rgba(139,92,246,.16); color: #c4b5fd; }
      .tag-other { background: rgba(156,163,175,.14); color: #a8adb5; }
      .h-time { color: #9a978f; }
      .h-item.now .h-time { color: #93c5fd; }
      .h-temp, .d-day { color: #dedddb; }
      .d-day.sat { color: #60a5fa; }
      .d-day.sun { color: #f87171; }
      .d-hi { color: #f87171; }
      .d-lo { color: #60a5fa; }
      .rain-chart { border-color: #2d2d2d; }
      .rc-max { color: #86847f; }
      .wx-sunny  { background: #33301f; }
      .wx-cloudy { background: #2a2a28; }
      .wx-rainy  { background: #20304a; }
      .wx-storm  { background: #292d4a; }
      .wx-snow   { background: #1d2f3f; }
      .rain-gray { color: #6f6e6b; }
    }

    /* ── 埋め込み高さが低いときのコンパクト表示 ── */
    @media (max-height: 480px) {
      body { padding: 6px 8px; }
      .hero { padding: 7px 12px; }
      .hero-icon { font-size: 24px; }
      .hero-temp { font-size: 20px; }
      .hero-desc { font-size: 10px; }
      .hero-meta { flex-direction: row; gap: 4px; }
      .section-label { margin: 6px 2px 3px; }
      .sched-card { min-height: 60px; }
      .event-item { padding: 4px 6px; min-height: 22px; }
      .hourly { padding: 4px 6px; }
      .h-item { padding: 4px 0; gap: 1px; }
      .h-icon, .d-icon { font-size: 13px; }
      .rain-chart { height: 26px; padding: 3px 6px 4px; }
      .weekly { padding: 4px 6px; }
      .d-item { padding: 4px 1px; gap: 1px; }
    }

    /* ── さらに低い埋め込み（Notion列の標準埋め込みなど）用の超コンパクト表示 ── */
    @media (max-height: 370px) {
      body { padding: 4px 8px; }
      .hero { padding: 4px 10px; border-radius: 9px; }
      .hero-main { gap: 6px; }
      .hero-icon { font-size: 17px; }
      .hero-temp { font-size: 15px; }
      .hero-desc { font-size: 8.5px; }
      .hero-chip { font-size: 8px; padding: 0 6px; }
      .section-label { font-size: 9px; margin: 4px 2px 2px; }
      .updating, .rc-max { font-size: 8px; }
      .sched-card { min-height: 40px; }
      .event-item { padding: 2px 5px; min-height: 18px; }
      .event-title { font-size: 10.5px; }
      .event-time, .allday-badge, .tag { font-size: 8px; }
      .hourly { padding: 2px 5px; gap: 3px; }
      .h-item { padding: 2px 0; gap: 0; }
      .h-time { font-size: 8px; }
      .h-icon { font-size: 12px; }
      .h-temp { font-size: 9.5px; }
      .rain-chart { display: none; }
      .weekly { padding: 2px 5px; gap: 3px; }
      .d-item { padding: 2px 1px; gap: 0; }
      .d-day { font-size: 9px; }
      .d-icon { font-size: 12px; }
      .d-rain { font-size: 7px; }
      .d-temps { flex-direction: row; gap: 3px; align-items: baseline; }
      .d-hi { font-size: 9.5px; }
      .d-lo { font-size: 8.5px; }
    }
  </style>
</head>
<body>

  <!-- 現在天気 -->
  <div id="weather-panel" class="hero wx-cloudy">
    <div class="skeleton">天気取得中...</div>
  </div>

  <!-- 今日の予定 -->
  <div class="section-label">
    <span id="date-label">読み込み中...</span>
    <span class="updating" id="updating-label"></span>
  </div>
  <div class="card sched-card">
    <div id="event-list" class="event-list"></div>
  </div>

  <!-- 時間別予報（下段に降水量グラフ） -->
  <div class="section-label">
    <span>この先24時間</span>
    <span class="rc-max" id="rain-max-label"></span>
  </div>
  <div class="card" id="hourly-container"></div>

  <!-- 週間予報 -->
  <div class="section-label">週間予報</div>
  <div class="card" id="weekly-container"></div>

  <script>
    const CAL_API = 'https://script.google.com/macros/s/AKfycby2_p8sbK9TQfYupZpG11n2slbYsBTbIgJzg0GUvj5U4AvkQ3bOx_8iy4bt1G0dKLU1Tw/exec';
    const WEEKDAYS = ['日','月','火','水','木','金','土'];

    function wmoInfo(code, isDay = true) {
      const icons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌦️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌦️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
      const descs = {0:'快晴',1:'ほぼ晴れ',2:'一部曇り',3:'曇り',45:'霧',48:'霧氷',51:'霧雨',53:'霧雨',55:'霧雨',61:'小雨',63:'雨',65:'大雨',71:'小雪',73:'雪',75:'大雪',80:'にわか雨',81:'にわか雨',82:'にわか雨',95:'雷雨',96:'雷雨',99:'雷雨'};
      const wxClass = code<=1 ? 'wx-sunny' : code<=3 ? 'wx-cloudy' : code<=48 ? 'wx-cloudy'
        : code<=65 ? 'wx-rainy' : code<=75 ? 'wx-snow' : code<=82 ? 'wx-rainy' : 'wx-storm';
      if (!isDay && (code===0||code===1)) return ['🌙', descs[code], 'wx-cloudy'];
      return [icons[code]||'🌡️', descs[code]||'不明', wxClass];
    }

    async function loadWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
        + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,is_day`
        + `&hourly=temperature_2m,weather_code,precipitation`
        + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum`
        + `&timezone=Asia%2FTokyo&forecast_days=7`;
      const d = await (await fetch(url)).json();
      renderWeatherPanel(d.current);
      renderHourly(d.hourly);
      renderWeekly(d.daily);
    }

    function renderWeatherPanel(cur) {
      const [icon, desc, wxCls] = wmoInfo(cur.weather_code, cur.is_day);
      const panel = document.getElementById('weather-panel');
      panel.className = `hero ${wxCls}`;
      panel.innerHTML = `
        <div class="hero-main">
          <span class="hero-icon">${icon}</span>
          <div>
            <div class="hero-temp">${Math.round(cur.temperature_2m)}°</div>
            <div class="hero-desc">${desc}</div>
          </div>
        </div>
        <div class="hero-meta">
          <span class="hero-chip">体感 ${Math.round(cur.apparent_temperature)}°</span>
          <span class="hero-chip">湿度 ${cur.relative_humidity_2m}%</span>
        </div>`;
    }

    function renderHourly(hourly) {
      const now = new Date();
      const cells = [], bars = [];
      let maxMm = 0;
      // 「今」の時刻を起点に2時間刻みで拾う（間隔が不均一にならないように）
      let start = hourly.time.findIndex(tm => (new Date(tm) - now) / 3600000 >= -0.5);
      if (start < 0) start = 0;
      for (let i = start; i < hourly.time.length; i += 2) {
        const t = new Date(hourly.time[i]);
        if ((t - now) / 3600000 > 23.5) break;
        const isNow = i === start;
        const h = t.getHours();
        const [icon,,wxCls] = wmoInfo(hourly.weather_code[i], h >= 6 && h < 18);
        const label = isNow ? '今' : h + '時';
        cells.push(`
          <div class="h-item ${wxCls}${isNow ? ' now' : ''}">
            <div class="h-time">${label}</div>
            <div class="h-icon">${icon}</div>
            <div class="h-temp">${Math.round(hourly.temperature_2m[i])}°</div>
          </div>`);
        // セルは2時間刻みなので、間の時刻の雨も拾えるよう次の1時間との最大値をとる。
        // 10mm/h を満量とし、小雨も見えるよう平方根スケール
        const mm = Math.max(hourly.precipitation[i] || 0, hourly.precipitation[i+1] || 0);
        maxMm = Math.max(maxMm, mm);
        const pct = Math.sqrt(Math.min(mm / 10, 1)) * 100;
        bars.push(`
          <div class="rc-col" title="${label}ごろ ${mm}mm/h">
            ${mm > 0 ? `<div class="rc-bar${pct >= 50 ? ' hi' : ''}" style="height:${pct}%"></div>` : ''}
          </div>`);
      }
      document.getElementById('rain-max-label').textContent =
        maxMm > 0 ? `降水量 最大 ${maxMm}mm/h` : '';
      document.getElementById('hourly-container').innerHTML =
        `<div class="h-scroll">
          <div class="hourly">${cells.join('')}</div>
          ${maxMm > 0 ? `<div class="rain-chart">${bars.join('')}</div>` : ''}
        </div>`;
    }

    function renderWeekly(daily) {
      const cols = daily.time.map((dateStr, i) => {
        const d  = new Date(dateStr + 'T00:00:00');
        const wd = d.getDay();
        const label = WEEKDAYS[wd];
        const cls   = wd===6 ? 'sat' : wd===0 ? 'sun' : '';
        const [icon,,wxBase] = wmoInfo(daily.weather_code[i]);
        const rain = daily.precipitation_probability_max[i];
        const wxCls = rain >= 50 ? 'wx-rainy' : wxBase === 'wx-rainy' || wxBase === 'wx-storm' ? 'wx-cloudy' : wxBase;
        return `
          <div class="d-item ${wxCls}${i===0?' today':''}">
            <div class="d-day ${cls}">${label}</div>
            <div class="d-icon">${icon}</div>
            <div class="d-rain ${rain >= 50 ? 'rain-blue' : 'rain-gray'}">${rain}%</div>
            <div class="d-temps">
              <span class="d-hi">${Math.round(daily.temperature_2m_max[i])}°</span>
              <span class="d-lo">${Math.round(daily.temperature_2m_min[i])}°</span>
            </div>
          </div>`;
      });
      document.getElementById('weekly-container').innerHTML =
        `<div class="weekly">${cols.join('')}</div>`;
    }

    let weatherCoords = null;   // 取得済みの緯度経度を覚えておき、更新時に再利用
    let weatherRetryTimer = null;

    /* 取得失敗時：まだ何も表示できていなければエラーを出し、1分後に再試行 */
    function showWeatherError() {
      const panel = document.getElementById('weather-panel');
      if (!panel.querySelector('.hero-main'))
        panel.innerHTML = '<div class="error-text">天気を取得できませんでした（自動で再試行します）</div>';
      clearTimeout(weatherRetryTimer);
      weatherRetryTimer = setTimeout(refreshWeather, 60 * 1000);
    }

    function initWeather() {
      // 優先順: URLパラメータ(?lat=..&lon=..) > 位置情報 > 東京
      // Notionのiframeでは位置情報がブロックされることが多いため、
      // 埋め込みURLに lat/lon を付ければ確実に固定地点を使える
      const params = new URLSearchParams(location.search);
      const pLat = parseFloat(params.get('lat')), pLon = parseFloat(params.get('lon'));
      if (isFinite(pLat) && isFinite(pLon)) {
        weatherCoords = [pLat, pLon];
        loadWeather(pLat, pLon).catch(showWeatherError);
        return;
      }
      const tokyo = () => { weatherCoords = [35.6895, 139.6917]; loadWeather(35.6895, 139.6917).catch(showWeatherError); };
      if (!navigator.geolocation) { tokyo(); return; }
      navigator.geolocation.getCurrentPosition(
        p => { weatherCoords = [p.coords.latitude, p.coords.longitude]; loadWeather(p.coords.latitude, p.coords.longitude).catch(tokyo); },
        tokyo
      );
    }
    function refreshWeather() {
      if (weatherCoords) loadWeather(weatherCoords[0], weatherCoords[1]).catch(showWeatherError);
      else initWeather();
    }

    /* ── スケジュール ── */
    /* 予定タイトル等はカレンダー由来の任意文字列なので、HTMLとして解釈されないようエスケープ */
    const esc = s => String(s).replace(/[&<>"']/g,
      c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function getTagClass(cal) {
      if (!cal) return 'tag-other';
      for (const k of ['学校','部活','個人','出張','受験'])
        if (cal.includes(k)) return `tag-${k}`;
      return 'tag-other';
    }
    function getDotClass(cal) {
      if (!cal) return 'dot-other';
      for (const k of ['学校','部活','個人','出張','受験'])
        if (cal.includes(k)) return `dot-${k}`;
      return 'dot-other';
    }
    function getTagLabel(cal) {
      if (!cal) return 'その他';
      for (const k of ['学校','部活','個人','出張','受験'])
        if (cal.includes(k)) return k;
      return 'その他';
    }
    const fmt = str => new Date(str).toLocaleTimeString('ja-JP',
      {timeZone:'Asia/Tokyo', hour:'2-digit', minute:'2-digit', hour12:false});
    function getTodayStr(jst) {
      return `${jst.getFullYear()}-${String(jst.getMonth()+1).padStart(2,'0')}-${String(jst.getDate()).padStart(2,'0')}`;
    }
    function isTodayEvent(ev, todayStr) {
      if (ev.allDay) {
        const s = ev.start.substring(0,10), end = ev.end ? ev.end.substring(0,10) : s;
        return s <= todayStr && todayStr < end;
      }
      // 深夜をまたぐ予定も拾えるよう、今日(JST)と期間が重なるかで判定
      const dayStart = new Date(`${todayStr}T00:00:00+09:00`).getTime();
      const dayEnd = dayStart + 86400000;
      const s = new Date(ev.start).getTime();
      const e = Math.max(ev.end ? new Date(ev.end).getTime() : s, s + 1);
      return s < dayEnd && e > dayStart;
    }
    function sortEvents(evs) {
      return evs.sort((a,b) => {
        if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
        return a.allDay ? 0 : new Date(a.start) - new Date(b.start);
      });
    }
    function renderEvents(events) {
      const list = document.getElementById('event-list');
      if (!events.length) {
        list.innerHTML = '<div class="no-events">今日の予定はありません</div>'; return;
      }
      const now = Date.now();
      list.innerHTML = events.map((ev, i) => {
        const timeHtml = ev.allDay
          ? `<span class="allday-badge">終日</span>`
          : `<span class="event-time">${fmt(ev.start)}〜${fmt(ev.end||ev.start)}</span>`;
        // 終了した予定はグレーアウト（終日は対象外）
        const isDone = !ev.allDay && new Date(ev.end || ev.start).getTime() < now;
        const hasDetail = ev.description || ev.location;
        const detailHtml = hasDetail ? `
          <div class="detail" id="detail-${i}">
            ${ev.location ? `<div class="detail-row"><span class="detail-label">📍</span><span class="detail-value">${esc(ev.location)}</span></div>` : ''}
            ${ev.description ? `<div class="detail-row"><span class="detail-label">📝</span><span class="detail-value">${esc(ev.description)}</span></div>` : ''}
          </div>` : '';
        return `
          <div class="event-wrap">
            <div class="event-item${isDone ? ' done' : ''}" onclick="toggleDetail(${i},${!!hasDetail})" id="item-${i}">
              <span class="event-dot ${getDotClass(ev.calendar)}"></span>
              ${timeHtml}
              <span class="event-title">${esc(ev.title)}</span>
              <span class="tag ${getTagClass(ev.calendar)}">${getTagLabel(ev.calendar)}</span>
            </div>
            ${detailHtml}
          </div>`;
      }).join('');
    }
    function toggleDetail(i, has) {
      if (!has) return;
      const d  = document.getElementById(`detail-${i}`);
      const it = document.getElementById(`item-${i}`);
      d.classList.toggle('visible');
      it.classList.toggle('open', d.classList.contains('visible'));
    }
    async function loadEvents() {
      const now = new Date();
      const jstNow = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));
      const todayStr = getTodayStr(jstNow);
      document.getElementById('date-label').textContent =
        `${jstNow.getMonth()+1}月${jstNow.getDate()}日（${WEEKDAYS[jstNow.getDay()]}）の予定`;
      try {
        const c = localStorage.getItem('today-schedule');
        if (c) { const {date,events} = JSON.parse(c); if (date===todayStr) renderEvents(events); }
      } catch(_) {}
      document.getElementById('updating-label').textContent = '更新中...';
      try {
        const timeMin = `${todayStr}T00:00:00+09:00`, timeMax = `${todayStr}T23:59:59+09:00`;
        const data = await (await fetch(`${CAL_API}?timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}`)).json();
        const ev = sortEvents(data.filter(e => isTodayEvent(e, todayStr)));
        localStorage.setItem('today-schedule', JSON.stringify({date:todayStr, events:ev}));
        renderEvents(ev);
      } catch(e) {
        if (!document.getElementById('event-list').children.length)
          document.getElementById('event-list').innerHTML = `<div class="error-text">取得エラー: ${e.message}</div>`;
      } finally {
        document.getElementById('updating-label').textContent = '';
      }
    }

    initWeather();
    loadEvents();

    /* ── 自動更新 ──
       Notion埋め込みは1回読み込まれると再読込されないため、
       定期的に & タブ復帰時に予定/天気を取り直して最新へ追従させる */
    setInterval(loadEvents, 5 * 60 * 1000);    // 予定: 5分ごと
    setInterval(refreshWeather, 30 * 60 * 1000); // 天気: 30分ごと
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') { loadEvents(); refreshWeather(); }
    });
  </script>
</body>
</html>
